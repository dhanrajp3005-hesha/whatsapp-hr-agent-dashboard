<ul class="space-y-2 text-sm max-h-96 overflow-y-auto">
  {% for entry in activity %}
  <li class="border-b pb-2 last:border-0">
    <div class="flex items-center justify-between">
      <span class="font-medium">{{ entry.event_type.replace("_", " ") }}</span>
      <span class="text-xs text-gray-400">{{ entry.created_at[:16].replace("T", " ") if entry.created_at else "" }}</span>
    </div>
    {% if entry.message %}
    <p class="text-gray-500">{{ entry.message }}</p>
    {% endif %}
  </li>
  {% else %}
  <li class="text-gray-400 text-center py-6">No activity yet.</li>
  {% endfor %}
</ul>
